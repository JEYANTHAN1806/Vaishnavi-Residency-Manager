openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Vaishnavi Residency Hotel Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: rooms
    description: Room management
  - name: guests
    description: Guest management
  - name: reservations
    description: Reservation management
  - name: payments
    description: Payment management
  - name: vouchers
    description: Voucher management
  - name: invoices
    description: Invoice management
  - name: reports
    description: Reports and analytics
  - name: settings
    description: System settings
  - name: dashboard
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ROOMS
  /rooms:
    get:
      operationId: getRooms
      tags: [rooms]
      summary: List all rooms
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/{id}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
    patch:
      operationId: updateRoom
      tags: [rooms]
      summary: Update a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomUpdate"
      responses:
        "200":
          description: Room updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
    delete:
      operationId: deleteRoom
      tags: [rooms]
      summary: Delete a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Room deleted

  /rooms/{id}/status:
    patch:
      operationId: updateRoomStatus
      tags: [rooms]
      summary: Update room status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomStatusUpdate"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  # GUESTS
  /guests:
    get:
      operationId: getGuests
      tags: [guests]
      summary: List all guests
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guest"
    post:
      operationId: createGuest
      tags: [guests]
      summary: Create a new guest entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestInput"
      responses:
        "201":
          description: Guest created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /guests/{id}:
    get:
      operationId: getGuest
      tags: [guests]
      summary: Get a guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
    patch:
      operationId: updateGuest
      tags: [guests]
      summary: Update a guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestUpdate"
      responses:
        "200":
          description: Guest updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /guests/{id}/checkin:
    post:
      operationId: checkInGuest
      tags: [guests]
      summary: Check in a guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /guests/{id}/checkout:
    post:
      operationId: checkOutGuest
      tags: [guests]
      summary: Check out a guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Checked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /guests/next-bill-number:
    get:
      operationId: getNextBillNumber
      tags: [guests]
      summary: Get the next auto-generated bill number
      responses:
        "200":
          description: Next bill number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillNumberResponse"

  # RESERVATIONS
  /reservations:
    get:
      operationId: getReservations
      tags: [reservations]
      summary: List all reservations
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
    post:
      operationId: createReservation
      tags: [reservations]
      summary: Create a reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationInput"
      responses:
        "201":
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  /reservations/{id}:
    get:
      operationId: getReservation
      tags: [reservations]
      summary: Get a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
    patch:
      operationId: updateReservation
      tags: [reservations]
      summary: Update a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationUpdate"
      responses:
        "200":
          description: Reservation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  # PAYMENTS
  /payments:
    get:
      operationId: getPayments
      tags: [payments]
      summary: List all payments
      parameters:
        - name: guestId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Create a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: Get a payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/next-voucher-number:
    get:
      operationId: getNextVoucherNumber
      tags: [payments]
      summary: Get next voucher number
      responses:
        "200":
          description: Next voucher number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherNumberResponse"

  # VOUCHERS
  /vouchers:
    get:
      operationId: getVouchers
      tags: [vouchers]
      summary: List all vouchers
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [payment, receipt]
        - name: search
          in: query
          schema:
            type: string
        - name: fromDate
          in: query
          schema:
            type: string
        - name: toDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of vouchers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Voucher"
    post:
      operationId: createVoucher
      tags: [vouchers]
      summary: Create a new voucher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoucherInput"
      responses:
        "201":
          description: Voucher created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"

  /vouchers/next-voucher-number:
    get:
      operationId: getNextVoucherNumberForType
      tags: [vouchers]
      summary: Get next voucher number for a voucher type
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [payment, receipt]
      responses:
        "200":
          description: Next voucher number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherNumberResponse"

  /vouchers/{id}:
    get:
      operationId: getVoucher
      tags: [vouchers]
      summary: Get a voucher by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Voucher details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"
        "404":
          description: Not found
    put:
      operationId: updateVoucher
      tags: [vouchers]
      summary: Update a voucher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoucherUpdate"
      responses:
        "200":
          description: Voucher updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"
        "404":
          description: Not found
    delete:
      operationId: deleteVoucher
      tags: [vouchers]
      summary: Delete a voucher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # REPORTS
  /reports/dashboard:
    get:
      operationId: getDashboardStats
      tags: [reports]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /reports/revenue:
    get:
      operationId: getRevenueReport
      tags: [reports]
      summary: Get revenue report
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, year]
      responses:
        "200":
          description: Revenue report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueReport"

  /reports/occupancy:
    get:
      operationId: getOccupancyReport
      tags: [reports]
      summary: Get occupancy report
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, year]
      responses:
        "200":
          description: Occupancy report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OccupancyReport"

  /reports/recent-guests:
    get:
      operationId: getRecentGuests
      tags: [reports]
      summary: Get recent guests
      responses:
        "200":
          description: Recent guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guest"

  /reports/upcoming-reservations:
    get:
      operationId: getUpcomingReservations
      tags: [reports]
      summary: Get upcoming reservations
      responses:
        "200":
          description: Upcoming reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"

  # SETTINGS
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  # USERS
  /users:
    get:
      operationId: getUsers
      tags: [auth]
      summary: List users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [auth]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [auth]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [auth]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, username, role, name]
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, receptionist]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [username, password, role, name]
      properties:
        username:
          type: string
        password:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, receptionist]

    UserUpdate:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, receptionist]

    Room:
      type: object
      required: [id, roomNumber, type, acType, rentPerDay, status]
      properties:
        id:
          type: integer
        roomNumber:
          type: string
        type:
          type: string
        acType:
          type: string
          enum: [AC, Non-AC]
        rentPerDay:
          type: number
        status:
          type: string
          enum: [available, occupied, reserved, cleaning]
        floor:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        createdAt:
          type: string

    RoomInput:
      type: object
      required: [roomNumber, type, rentPerDay]
      properties:
        roomNumber:
          type: string
        type:
          type: string
        acType:
          type: string
          enum: [AC, Non-AC]
        rentPerDay:
          type: number
        floor:
          type: string
        description:
          type: string

    RoomUpdate:
      type: object
      properties:
        roomNumber:
          type: string
        type:
          type: string
        acType:
          type: string
          enum: [AC, Non-AC]
        rentPerDay:
          type: number
        status:
          type: string
          enum: [available, occupied, reserved, cleaning]
        floor:
          type: string
        description:
          type: string

    RoomStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [available, occupied, reserved, cleaning]

    Guest:
      type: object
      required: [id, billNumber, guestName, roomId, checkInDate, status]
      properties:
        id:
          type: integer
        billNumber:
          type: string
        date:
          type: string
        time:
          type: string
        guestName:
          type: string
        gender:
          type: ["string", "null"]
        age:
          type: ["integer", "null"]
        mobile:
          type: string
        alternativeMobile:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        aadhaarNumber:
          type: ["string", "null"]
        idProofType:
          type: ["string", "null"]
        pax:
          type: integer
        roomId:
          type: integer
        roomNumber:
          type: ["string", "null"]
        checkInDate:
          type: string
        checkInTime:
          type: ["string", "null"]
        expectedCheckOutDate:
          type: ["string", "null"]
        expectedCheckOutTime:
          type: ["string", "null"]
        actualCheckOutDate:
          type: ["string", "null"]
        actualCheckOutTime:
          type: ["string", "null"]
        numberOfDays:
          type: ["integer", "null"]
        rentPerDay:
          type: number
        extraCharges:
          type: number
        discount:
          type: number
        gst:
          type: number
        totalAmount:
          type: number
        advancePaid:
          type: number
        balanceAmount:
          type: number
        paymentMode:
          type: ["string", "null"]
        remarks:
          type: ["string", "null"]
        receptionistName:
          type: ["string", "null"]
        status:
          type: string
          enum: [booked, checked-in, checked-out, cancelled]
        createdAt:
          type: string

    GuestInput:
      type: object
      required: [guestName, mobile, roomId, checkInDate, rentPerDay]
      properties:
        billNumber:
          type: string
        date:
          type: string
        time:
          type: string
        guestName:
          type: string
        gender:
          type: string
        age:
          type: integer
        mobile:
          type: string
        alternativeMobile:
          type: string
        address:
          type: string
        aadhaarNumber:
          type: string
        idProofType:
          type: string
        pax:
          type: integer
        roomId:
          type: integer
        checkInDate:
          type: string
        checkInTime:
          type: string
        expectedCheckOutDate:
          type: string
        expectedCheckOutTime:
          type: string
        numberOfDays:
          type: integer
        rentPerDay:
          type: number
        extraCharges:
          type: number
        discount:
          type: number
        gst:
          type: number
        totalAmount:
          type: number
        advancePaid:
          type: number
        balanceAmount:
          type: number
        paymentMode:
          type: string
        remarks:
          type: string
        receptionistName:
          type: string

    GuestUpdate:
      type: object
      properties:
        guestName:
          type: string
        gender:
          type: string
        age:
          type: integer
        mobile:
          type: string
        alternativeMobile:
          type: string
        address:
          type: string
        aadhaarNumber:
          type: string
        idProofType:
          type: string
        pax:
          type: integer
        roomId:
          type: integer
        checkInDate:
          type: string
        checkInTime:
          type: string
        expectedCheckOutDate:
          type: string
        expectedCheckOutTime:
          type: string
        numberOfDays:
          type: integer
        rentPerDay:
          type: number
        extraCharges:
          type: number
        discount:
          type: number
        gst:
          type: number
        totalAmount:
          type: number
        advancePaid:
          type: number
        balanceAmount:
          type: number
        paymentMode:
          type: string
        remarks:
          type: string
        receptionistName:
          type: string
        status:
          type: string
          enum: [booked, checked-in, checked-out, cancelled]

    CheckoutInput:
      type: object
      properties:
        actualCheckOutDate:
          type: string
        actualCheckOutTime:
          type: string
        finalAmount:
          type: number
        balanceAmount:
          type: number
        paymentMode:
          type: string

    BillNumberResponse:
      type: object
      required: [billNumber]
      properties:
        billNumber:
          type: string

    Reservation:
      type: object
      required: [id, reservationNumber, guestName, roomId, checkInDate, checkOutDate, status]
      properties:
        id:
          type: integer
        reservationNumber:
          type: string
        guestName:
          type: string
        mobile:
          type: string
        roomId:
          type: integer
        roomNumber:
          type: ["string", "null"]
        checkInDate:
          type: string
        checkOutDate:
          type: string
        advance:
          type: number
        status:
          type: string
          enum: [reserved, confirmed, cancelled]
        remarks:
          type: ["string", "null"]
        createdAt:
          type: string

    ReservationInput:
      type: object
      required: [guestName, mobile, roomId, checkInDate, checkOutDate]
      properties:
        guestName:
